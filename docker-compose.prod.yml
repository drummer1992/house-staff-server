version: '3.9'

services:
  app:
    build:
      context: .
      target: prod
    image: house-staff:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U andrii -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data: