name: Release
on:
  push:
    branches: [ main ]
jobs:
  release:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to AWS ECR
        env:
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --target=prod \
            -t $ECR_REGISTRY/${{ vars.AWS_REPOSITORY }}:latest \
            -t $ECR_REGISTRY/${{ vars.AWS_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ vars.AWS_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ vars.AWS_REPOSITORY }}:$IMAGE_TAG

      - name: Update AWS ECS service
        run: |
          aws ecs update-service \
              --cluster ${{ vars.AWS_CLUSTER }} \
              --service ${{ vars.AWS_SERVICE }} \
              --force-new-deployment
